<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart</title>
    <link rel="stylesheet" href="css/style.css" class="css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          <h2>GrabGrocery</h2>
        </div>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="product.html">Products</a></li>
          <li><a href="cart.html">Cart</a></li>
          <li><a href="orders.html">My Orders</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </header>
    <h1>Shopping Cart</h1>
    <div class="cart-container">
      <table class="cart-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="cart-items">
          <!-- Cart items will be dynamically added here -->
        </tbody>
      </table>

      <div class="address-box">
        <h3>Delivery Address</h3>

        <input type="text" id="address-name" placeholder="Full Name" />
        <input type="text" id="address-phone" placeholder="Phone Number" />
        <input type="text" id="address-street" placeholder="Street / House No." />
        <input type="text" id="address-city" placeholder="City" />
        <input type="text" id="address-pincode" placeholder="Pincode" />

        <button type="button" id="use-location-btn">📍 Use My Current Location</button>
        <p id="location-status"></p>
      </div>

      <div class="cart-summary">
        <p>Total: ₹<span id="cart-total">0.00</span></p>
        <button id="checkout-button">Checkout</button>
      </div>
    </div>

    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
